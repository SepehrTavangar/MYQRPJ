<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>پروژه بازسازی</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">

  <style>

    body{
      margin:0;
      padding:0;
      background:#f2f4f8;
      font-family:'Vazirmatn', sans-serif;
      direction:rtl;
    }

    .container{
      width:90%;
      max-width:700px;
      margin:40px auto;
    }

    .header{
      background:#ffffff;
      padding:25px;
      border-radius:18px;
      text-align:center;
      box-shadow:0 4px 15px rgba(0,0,0,0.08);
      margin-bottom:25px;
    }

    .header h1{
      margin:0;
      color:#8b0000;
      font-size:30px;
    }

   .card{
  background:white;
  border-radius:24px;
  padding:32px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  border:1px solid #f0f0f0;
}

   .item{
  padding:20px 0;
  border-bottom:1px solid #eeeeee;
  font-size:18px;
  line-height:32px;
}

    .item:last-child{
      border-bottom:none;
    }

    .label{
      font-weight:bold;
      color:#444;
    }

    .pdf-section{
      margin-top:30px;
    }

    .pdf-button{
  display:block;
  background:#c62828;
  color:white;
  text-decoration:none;
  padding:18px;
  margin-top:18px;
  border-radius:16px;
  text-align:center;
  font-size:17px;
  font-weight:700;
  transition:0.25s;
  box-shadow:0 6px 18px rgba(198,40,40,0.22);
}

   .pdf-button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 22px rgba(198,40,40,0.28);
}

    .vip-box{
  margin-top:35px;
  background:#c0c0c0;
  color:#444;
  padding:20px;
  border-radius:18px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}
.logo-box{
  text-align:center;
  margin-bottom:20px;
}

.logo-box img{
  width:200px;
}
  </style>
</head>

<body>

  <div class="container">
<div class="logo-box">
  <img src="Logo.png" alt="Bank Mellat Logo">
</div>
  <div class="vip-box">
   لابی اختصاصی مدیرعامل
</div>

    <div class="card">

      <div class="item">
        <span class="label">نام ساختمان:</span>
        ساختمان ادارات مرکزی بانک
      </div>

      <div class="item">
        <span class="label">موقعیت:</span>
        طبقه -1
      </div>

      <div class="item">
        <span class="label">تاریخ آخرین بازسازی:</span>
        اسفند 1404
      </div>

      <div class="item">
        <span class="label">نام ناظرین:</span>
        سپهر توانگر ، علی خجسته
      </div>

      <div class="item">
        <span class="label">نام شرکت پیمانکار:</span>
        دیماس سازان سامان
      </div>

      <div class="pdf-section">

        <a class="pdf-button" href="CEO Loby Renders.pdf" target="_blank">
          📷 تصاویر شبیه سازی بازسازی
        </a>

        <a class="pdf-button" href="CEO Plans.pdf" target="_blank">
          📐 نقشه های بازسازی
        </a>

        <a class="pdf-button" href="Costs.pdf" target="_blank">
          💰 گزارش هزینه و امور انجام شده
        </a>

      </div>
      
<div class="vip-box">
         اطلاعات تخصصی
      </div>
    </div>

  </div>

</body>
</html>
