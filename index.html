<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>پروژه بازسازی</title>

  <style>

    body{
      margin:0;
      padding:0;
      background:#f2f4f8;
      font-family:'Vazirmatn', sans-serif;
      direction:rtl;
    }

    .container{
      width:90%;
      max-width:700px;
      margin:40px auto;
    }

    .header{
      background:#ffffff;
      padding:25px;
      border-radius:18px;
      text-align:center;
      box-shadow:0 4px 15px rgba(0,0,0,0.08);
      margin-bottom:25px;
    }

    .header h1{
      margin:0;
      color:#8b0000;
      font-size:30px;
    }

    .card{
      background:white;
      border-radius:18px;
      padding:25px;
      box-shadow:0 4px 15px rgba(0,0,0,0.08);
    }

    .item{
      padding:15px 0;
      border-bottom:1px solid #e5e5e5;
      font-size:18px;
    }

    .item:last-child{
      border-bottom:none;
    }

    .label{
      font-weight:bold;
      color:#444;
    }

    .pdf-section{
      margin-top:30px;
    }

    .pdf-button{
      display:block;
      background:#c62828;
      color:white;
      text-decoration:none;
      padding:15px;
      margin-top:15px;
      border-radius:12px;
      text-align:center;
      font-size:17px;
      transition:0.3s;
    }

    .pdf-button:hover{
      opacity:0.9;
    }

    .vip-box{
      margin-top:35px;
      background:linear-gradient(135deg,#8b0000,#c49b3f);
      color:white;
      padding:20px;
      border-radius:18px;
      text-align:center;
      font-size:20px;
      font-weight:bold;
      box-shadow:0 5px 20px rgba(0,0,0,0.15);
    }

  </style>
</head>
