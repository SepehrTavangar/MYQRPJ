<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>پروژه بازسازی</title>

  <style>

    body{
      margin:0;
      padding:0;
      background:#f2f4f8;
      font-family:tahoma;
      direction:rtl;
    }

    .container{
      width:90%;
      max-width:700px;
      margin:40px auto;
    }

    .header{
      background:#ffffff;
      padding:25px;
      border-radius:18px;
      text-align:center;
      box-shadow:0 4px 15px rgba(0,0,0,0.08);
      margin-bottom:25px;
    }

    .header h1{
      margin:0;
      color:#8b0000;
      font-size:30px;
    }

    .card{
      background:white;
      border-radius:18px;
      padding:25px;
      box-shadow:0 4px 15px rgba(0,0,0,0.08);
    }

    .item{
      padding:15px 0;
      border-bottom:1px solid #e5e5e5;
      font-size:18px;
    }

    .item:last-child{
      border-bottom:none;
    }

    .label{
      font-weight:bold;
      color:#444;
    }

    .pdf-section{
      margin-top:30px;
    }

    .pdf-button{
      display:block;
      background:#8b0000;
      color:white;
      text-decoration:none;
      padding:15px;
      margin-top:15px;
      border-radius:12px;
      text-align:center;
      font-size:17px;
      transition:0.3s;
    }

    .pdf-button:hover{
      opacity:0.9;
    }

    .vip-box{
      margin-top:35px;
      background:linear-gradient(135deg,#8b0000,#c49b3f);
      color:white;
      padding:20px;
      border-radius:18px;
      text-align:center;
      font-size:20px;
      font-weight:bold;
      box-shadow:0 5px 20px rgba(0,0,0,0.15);
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      <h1>پروژه بازسازی بانک ملت</h1>
    </div>

    <div class="card">

      <div class="item">
        <span class="label">نام ساختمان:</span>
        ساختمان ادارات مرکزی بانک
      </div>

      <div class="item">
        <span class="label">موقعیت:</span>
        طبقه -1
      </div>

      <div class="item">
        <span class="label">تاریخ آخرین بازسازی:</span>
        اسفند 1404
      </div>

      <div class="item">
        <span class="label">نام ناظرین:</span>
        سپهر توانگر ، علی خجسته
      </div>

      <div class="item">
        <span class="label">نام شرکت پیمانکار:</span>
        دیماس سازان سامان
      </div>

      <div class="pdf-section">

        <a class="pdf-button" href="CEO Loby Renders.pdf" target="_blank">
          📷 تصاویر شبیه سازی بازسازی
        </a>

        <a class="pdf-button" href="CEO Plans.pdf" target="_blank">
          📐 نقشه های بازسازی
        </a>

        <a class="pdf-button" href="costs.pdf" target="_blank">
          💰 گزارش هزینه و امور انجام شده
        </a>

      </div>

      <div class="vip-box">
        🔒 لابی اختصاصی مدیرعامل
      </div>

    </div>

  </div>

</body>
</html>
