<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>پروژه بازسازی</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">

  <style>
.login-modal{
  position:fixed;
  top:0;
  right:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.login-box{
  background:white;
  padding:35px;
  border-radius:24px;
  width:90%;
  max-width:340px;
  text-align:center;
  box-shadow:0 12px 35px rgba(0,0,0,0.18);
}

.login-box h2{
  margin-bottom:25px;
  color:#c62828;
}

.login-box input{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border:1px solid #ddd;
  border-radius:12px;
  font-family:'Vazirmatn', sans-serif;
  font-size:15px;
  box-sizing:border-box;
}

.login-box button{
  width:100%;
  padding:14px;
  background:#c62828;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-family:'Vazirmatn', sans-serif;
  cursor:pointer;
}

.login-box button:hover{
  opacity:0.92;
}

#errorMessage{
  color:red;
  margin-top:12px;
  font-size:14px;
}
    body{
  margin:0;
  padding:0;
  background:
  radial-gradient(circle at top right, rgba(198,40,40,0.05), transparent 22%),
  linear-gradient(to bottom,#f8f9fb,#eef2f7);
  font-family:'Vazirmatn', sans-serif;
  direction:rtl;
  min-height:100vh;
}

    .container{
      width:90%;
      max-width:700px;
      margin:40px auto;
    }

    .header{
      background:#ffffff;
      padding:25px;
      border-radius:18px;
      text-align:center;
      box-shadow:0 4px 15px rgba(0,0,0,0.08);
      margin-bottom:25px;
    }

    .header h1{
      margin:0;
      color:#8b0000;
      font-size:30px;
    }

   .card{
  background:white;
  border-radius:24px;
  padding:32px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  border:1px solid #f0f0f0;
}

   .item{
  padding:20px 0;
  border-bottom:1px solid #eeeeee;
  font-size:18px;
  line-height:32px;
}

    .item:last-child{
      border-bottom:none;
    }

    .label{
      font-weight:bold;
      color:#444;
    }

    .pdf-section{
      margin-top:30px;
    }

    .pdf-button{
  display:block;
  background:#c62828;
  color:white;
  text-decoration:none;
  padding:18px;
  margin-top:18px;
  border-radius:16px;
  text-align:center;
  font-size:17px;
  font-weight:700;
  transition:0.25s;
  box-shadow:0 6px 18px rgba(198,40,40,0.22);
}

   .pdf-button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 22px rgba(198,40,40,0.28);
}

    .vip-box{
  margin-top:35px;
  background:#c0c0c0;
  color:#444;
  padding:20px;
  border-radius:18px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}
.logo-box{
  text-align:center;
  margin-bottom:20px;
}

.logo-box img{
  width:200px;
  opacity:0.95;
  filter:drop-shadow(0 6px 12px rgba(0,0,0,0.12));
  transition:0.3s;
}
.logo-box img:hover{
  transform:translateY(-3px);
}
  </style>
</head>
<div class="login-modal" id="loginModal">

  <div class="login-box">

    <h2>ورود به بخش اسناد</h2>

    <input type="text" id="username" placeholder="نام کاربری">

    <input type="password" id="password" placeholder="رمز عبور">

    <button onclick="checkLogin()">ورود</button>

    <p id="errorMessage"></p>

  </div>

</div>
<script>

let selectedPDF = "";

function openLogin(pdfFile){
  selectedPDF = pdfFile;
  document.getElementById("loginModal").style.display = "flex";
}

function checkLogin(){

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  if(username === "admin" && password === "1234"){

    window.open(selectedPDF, "_blank");

    document.getElementById("loginModal").style.display = "none";

    document.getElementById("errorMessage").innerText = "";

  }else{

    document.getElementById("errorMessage").innerText =
    "نام کاربری یا رمز عبور اشتباه است";

  }
}

</script>
<body>

  <div class="container">
<div class="logo-box">
  <img src="Logo.png" alt="Bank Mellat Logo">
</div>
  <div class="vip-box">
   لابی اختصاصی مدیرعامل
</div>

    <div class="card">

      <div class="item">
        <span class="label">نام ساختمان:</span>
        ساختمان ادارات مرکزی بانک
      </div>

      <div class="item">
        <span class="label">موقعیت:</span>
        طبقه -1
      </div>

      <div class="item">
        <span class="label">تاریخ آخرین بازسازی:</span>
        اسفند 1404
      </div>

      <div class="item">
        <span class="label">نام ناظرین:</span>
        سپهر توانگر ، علی خجسته
      </div>

      <div class="item">
        <span class="label">نام شرکت پیمانکار:</span>
        دیماس سازان سامان
      </div>

      <div class="pdf-section">

        <a class="pdf-button" href="#" onclick="openLogin('CEO Loby Renders.pdf')">
  📷 تصاویر شبیه سازی بازسازی
</a>

<a class="pdf-button" href="#" onclick="openLogin('CEO Plans.pdf')">
  📐 نقشه های بازسازی
</a>

<a class="pdf-button" href="#" onclick="openLogin('Costs.pdf')">
  💰 گزارش هزینه و امور انجام شده
</a>

      </div>
      
<div class="vip-box">
         اطلاعات تخصصی
      </div>
    </div>

  </div>

</body>
</html>
